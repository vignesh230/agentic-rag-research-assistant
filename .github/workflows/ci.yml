name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        # Skips integration tests (need live Postgres) and test_pipeline.py
        # (integration-only).  All other tests are fully mocked.
        run: |
          python -m pytest \
            --ignore=tests/test_pipeline.py \
            -m "not integration" \
            -v \
            --tb=short

  eval-gate:
    name: eval schema gate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate golden set (if present)
        # Validates every line of golden_set.jsonl against GoldenItem schema.
        # Passes silently if the file doesn't exist yet (pre-population stage).
        # Fails loudly if the file exists but contains malformed entries.
        run: |
          python - <<'EOF'
          from pathlib import Path
          from rag_agent.eval.loader import load_golden_set

          path = Path("data/golden_set.jsonl")
          if not path.exists():
              print("golden_set.jsonl not found — skipping schema validation.")
          else:
              items = load_golden_set(path)
              print(f"golden_set.jsonl OK: {len(items)} entries validated.")
          EOF
        env:
          PYTHONPATH: src

      - name: Check eval thresholds (if present)
        # Verifies that data/eval_thresholds.json is valid JSON and contains
        # the expected keys.  The thresholds file is written by the human after
        # running the harness: python -m rag_agent.eval.harness --out results.md
        # then manually committing data/eval_thresholds.json with desired floors.
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path

          path = Path("data/eval_thresholds.json")
          if not path.exists():
              print("eval_thresholds.json not found — skipping threshold gate.")
          else:
              data = json.loads(path.read_text())
              required_keys = {"faithfulness", "answer_relevancy"}
              missing = required_keys - data.keys()
              if missing:
                  raise ValueError(f"eval_thresholds.json missing keys: {missing}")
              print(f"eval_thresholds.json OK: {data}")
          EOF
        env:
          PYTHONPATH: src
